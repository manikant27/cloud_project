name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/cloud_project
            git pull origin main
            cd backend
            python3 -m pip install --upgrade pip
            python3 -m pip install -r requirements.txt
            pm2 describe stock-api > /dev/null 2>&1 && pm2 restart stock-api || pm2 start "uvicorn main:app --host 0.0.0.0 --port 8000" --name stock-api
            pm2 save
name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Ensure pip3 exists
            which pip3 || sudo apt update && sudo apt install python3-pip -y

            # Clone if not exists
            if [ ! -d "/home/ubuntu/cloud_project" ]; then
              git clone https://github.com/manikant27/cloud_project.git /home/ubuntu/cloud_project
            fi

            cd /home/ubuntu/cloud_project
            git pull origin main

            cd backend

            # Install dependencies (FIXED)
            pip3 install --upgrade pip --break-system-packages
            pip3 install --break-system-packages -r requirements.txt

            # Restart FastAPI app using PM2 (FIXED)
            pm2 describe stock-api > /dev/null 2>&1 && pm2 restart stock-api || pm2 start "python3 -m uvicorn main:app --host 0.0.0.0 --port 8000" --name stock-api

            pm2 save